name: Publish MCSmaker 1.6.0

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release-v1.6.0.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view v1.6.0 --repo "${{ github.repository }}" >/dev/null 2>&1 || \
          gh release create v1.6.0 \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "MCSmaker 1.6.0" \
            --notes "Linux-first server manager release.

          - Linux CLI for headless servers
          - Electron desktop GUI
          - Vanilla, Paper, Fabric and Forge support
          - JAR downloads through mcutils
          - Real Java process start/stop with PID tracking
          - Per-server memory settings and log files"
